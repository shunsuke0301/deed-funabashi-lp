document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-top:4px;\">Google 138件／駅 徒歩3分<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <a href=\"https:\u002F\u002Fline.me\u002FR\u002Fti\u002Fp\u002F%40114retwq\" style=\"display:block;margin-top:26px;background:#C2784B;color:#fff;font-family:'Shippori Mincho';font-weight:500;font-size:17px;letter-spacing:.12em;text-align:center;padding:19px;border-radius:2px;text-decoration:none;\">初回3,000円で体験する<\u002Fa>\n    <p style=\"font-size:10px;color:#A89E90;margin:12px 0 0;letter-spacing:.06em;\">マンツーマン専用／しつこい勧誘なし<\u002Fp>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ============================================================ -->\n  <!-- ===================== 2. 共感（悩み） ======================== -->\n  <!-- ============================================================ -->\n  <!-- ===================== CONCEPT ============================ -->\n  <section style=\"background:#FCFAF6;padding:64px 30px 58px;text-align:center;\">\n    <div style=\"font-family:'Marcellus';font-size:11px;letter-spacing:.42em;color:#C2784B;\">CONCEPT<\u002Fdiv>\n    <p style=\"font-family:'Shippori Mincho';font-weight:500;font-size:25px;line-height:1.95;margin:20px 0 0;letter-spacing:.07em;\">トレーニングを、<br>特別な日課ではなく<br><span style=\"color:#C2784B;\">日常<\u002Fspan>に。<\u002Fp>\n    <div style=\"display:flex;align-items:center;justify-content:center;gap:9px;margin-top:20px;\"><span style=\"width:26px;height:1px;background:#D8C9B5;\"><\u002Fspan><span style=\"width:5px;height:5px;background:#C2784B;transform:rotate(45deg);\"><\u002Fspan><span style=\"width:26px;height:1px;background:#D8C9B5;\"><\u002Fspan><\u002Fdiv>\n    <p style=\"font-size:13px;line-height:2.15;color:#6F665B;margin:24px 0 0;\">短期間で追い込む2ヶ月型ではなく、<br>無理なく続けられる“継続型”。<br>だから、夏のその先まで、キレイが続く。<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===================== 2. 共感（悩み） ======================== -->\n  <section style=\"background:#F4EFE7;padding:62px 26px;\">\n    <div style=\"text-align:center;\">\n      <div style=\"font-family:'Marcellus';font-size:11px ncho';font-weight:500;font-size:17px;letter-spacing:.12em;padding:19px;border-radius:2px;text-decoration:none;\">LINEで予約する<\u002Fa>\n    <div style=\"display:flex;gap:12px;margin-top:12px;\">\n      <a href=\"tel:05071162675\" style=\"flex:1;text-align:center;background:transparent;border:1px solid #C2784B;color:#C2784B;font-family:'Shippori Mincho';font-weight:500;font-size:14px;letter-spacing:.08em;padding:16px;border-radius:2px;text-decoration:none;\">電話で予約<\u002Fa>\n      <!-- 差し替え: 予約フォームのリンク先 -->\n      <a href=\"#\" style=\"flex:1;text-align:center;background:transparent;border:1px solid #C2784B;color:#C2784B;font-family:'Shippori Mincho';font-weight:500;font-size:14px;letter-spacing:.08em;padding:16px;border-radius:2px;text-decoration:none;\">フォーム予約<\u002Fa>\n    <\u002Fdiv>\n\n    <!-- 地図プレースホルダー -->\n    <div style=\"margin-top:36px;aspect-ratio:16\u002F9;background:repeating-linear-gradient(45deg,#ECE5D9,#ECE5D9 12px,#E4DBCC 12px,#E4DBCC 24px);display:flex;align-items:center;justify-content:center;border-radius:2px;\">\n      <span style=\"font-family:monospace;font-size:11px;color:#B3A793;\">[ Googleマップ 埋め込み予定 ]<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- 店舗情報 -->\n    <div style=\"margin-top:22px;text-align:left;border-top:1px solid #EAE3D7;padding-top:24px;\">\n      <div style=\"font-family:'Shippori Mincho';font-weight:500;font-size:17px;text-align:center;letter-spacing:.05em;\">DEED パーソナルジム∞ 船橋店<\u002Fdiv>\n      <dl style=\"margin:20px 0 0;font-size:13px;line-height:1.9;color:#6F665B;\">\n        <div style=\"display:flex;gap:12px;padding:10px 0;border-top:1px solid #EFE9DE;\">\n          <dt style=\"flex:none;width:62px;color:#A89E90;font-family:'Marcellus';font-size:11px;letter-spacing:.1em;\">ACCESS<\u002Fdt>\n          <dd style=\"margin:0;\">京成船橋駅 徒歩3分／JR船橋駅 徒歩5分<\u002Fdd>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;padding:10px 0;border-top:1px solid #EFE9DE;\">\n          <dt style=\"flex:none;width:62px;color:#A89E90;font-family:'Marcellus';font-size:11px;letter-spacing:.1em;\">ADDRESS<\u002Fdt>\n          <dd style=\"margin:0;\">〒273-0005 千葉県船橋市本町2-25-17 高橋ビル202<\u002Fdd>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;padding:10px 0;border-top:1px solid #EFE9DE;\">\n          <dt style=\"flex:none;width:62px;color:#A89E90;font-family:'Marcellus';font-size:11px;letter-spacing:.1em;\">HOURS<\u002Fdt>\n          <dd style=\"margin:0;\">平日 8:00-22:30／土日祝 8:00-21:00<\u002Fdd>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;padding:10px 0;border-top:1px solid #EFE9DE;\">\n          <dt style=\"flex:none;width:62px;color:#A89E90;font-family:'Marcellus';font-size:11px;letter-spacing:.1em;\">TEL<\u002Fdt>\n          <dd style=\"margin:0;\"><a href=\"tel:05071162675\" style=\"color:#C2784B;text-decoration:none;\">050-7116-2675<\u002Fa><\u002Fdd>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;padding:10px 0;border-top:1px solid #EFE9DE;border-bottom:1px solid #EFE9DE;\">\n          <dt style=\"flex:none;width:62px;color:#A89E90;font-family:'Marcellus';font-size:11px;letter-spacing:.1em;\">PARKING<\u002Fdt>\n          <dd style=\"margin:0;\">なし（公共交通機関をご利用ください）<\u002Fdd>\n        <\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv>\n    <div style=\"font-family:'Marcellus';font-size:11px;letter-spacing:.3em;color:#C0B4A0;margin-top:30px;\">DEED FUNABASHI<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== 追従CTA ===== -->\n  <div style=\"position:fixed;left:0;right:0;bottom:0;z-index:50;pointer-events:none;\">\n    <div style=\"max-width:480px;margin:0 auto;pointer-events:auto;background:rgba(252,250,246,.94);backdrop-filter:blur(10px);border-top:1px solid #E2DACC;padding:11px 16px;display:flex;align-items:center;gap:13px;\">\n      <div style=\"flex:none;line-height:1.25;\">\n        <div style=\"font-size:9px;color:#A89E90;letter-spacing:.1em;font-family:'Marcellus';\">FIRST TRIAL<\u002Fdiv>\n        <div style=\"font-family:'Shippori Mincho';font-weight:500;font-size:18px;color:#C2784B;\">3,000<span style=\"font-size:10px;color:#2A2521;\">円<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <a href=\"https:\u002F\u002Fline.me\u002FR\u002Fti\u002Fp\u002F%40114retwq\" style=\"flex:1;text-align:center;background:#C2784B;color:#fff;font-family:'Shippori Mincho';font-weight:500;font-size:15px;letter-spacing:.1em;padding:15px;border-radius:2px;text-decoration:none;\">体験を予約する<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text\u002Fx-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { fv: 'a', openIndex: 0 };\n\n  renderVals() {\n    const fv = this.state.fv;\n\n    const problems = [\n      { no: '01', t: '30代になって、前より体型が戻りにくい' },\n      { no: '02', t: '自己流の運動や食事制限が、続かない' },\n      { no: '03', t: 'パーソナルって、怖い・キツそうで不安' },\n      { no: '04', t: 'ジムって、なんだか高そう…' },\n    ];\n\n    const reasons = [\n      { n: '01', slotId: 'deed-reason-1', tag: 'BEGINNER FRIENDLY', jp: '初心者にやさしい', title: '未経験でも、ここから始められる', text: 'お客様のほとんどがパーソナル初めて。体力や運動経験に合わせて、できることから一緒にスタートします。追い込みはしません。', img: '初回カウンセリング／笑顔の女性' },\n      { n: '02', slotId: 'deed-reason-2', tag: 'CLEAN & HOMEY', jp: 'アットホーム＋清潔感', title: '自分のペースで、集中できる', text: '明るく清潔で、リラックスして取り組める環境。予約制・マンツーマンだから、自分のペースで集中できます。', img: '清潔で明るい店内' },\n      { n: '03', slotId: 'deed-reason-3', tag: 'YOUR TRAINER', jp: 'トレーナーの顔が見える', title: 'どんな人か、先にわかる安心', text: '担当トレーナーの人柄が見えるから安心。やさしく、一緒に続けられる伴走者です。トレーナーの指名もできます。', img: 'トレーニング中の笑顔' },\n    ];\n\n    const assurances = [\n      { h: '明朗会計。', t: '高額パッケージ・高額入会金はありません。' },\n      { h: 'マンツーマン1回1万円未満。', t: '予約制でこの価格。' },\n      { h: '食事指導込み。', t: '入会後1ヶ月間は無料。白米もOKの続けやすい指導。' },\n    ];\n\n    const trainers = [\n      { slotId: 'deed-trainer-1', name: '鶴田トレーナー', role: '代表トレーナー', word: '「できた！」を一緒に増やしましょう。まずは気軽に。' },\n      { slotId: 'deed-trainer-2', name: '◯◯トレーナー', role: 'パーソナルトレーナー', word: '運動が苦手な方こそ歓迎。やさしくお伝えします。' },\n      { slotId: 'deed-trainer-3', name: '◯◯トレーナー', role: 'パーソナルトレーナー', word: '続けられるペースを、一緒に見つけましょう。' },\n    ];\n\n    const reviews = [\n      { initial: 'A', name: 'A.M 様', meta: '30代・女性', text: '初めてのパーソナルで緊張しましたが、丁寧に教えてもらえて安心しました。' },\n      { initial: 'Y', name: 'Y.S 様', meta: '30代・女性', text: '筋トレは大嫌いでしたが、ここでは楽しく運動できています。' },\n      { initial: 'K', name: 'K.T 様', meta: '40代・女性', text: '広告系の高額ジムと違い、サイト通りのお手頃価格。続けたいと思えました。' },\n      { initial: 'N', name: 'N.H 様', meta: '20代・女性', text: 'アットホームで、女性ひとりでも通いやすいです。' },\n    ];\n\n    const plans = [\n      { name: '30分 × 月4回', note: 'まずは気軽に続けたい方に', price: '16,500', popular: false },\n      { name: '60分 × 月2回', note: 'じっくり1回派の方に', price: '16,500', popular: false },\n      { name: '60分 × 月4回', note: 'しっかり変えたい方に', price: '32,560', popular: true },\n    ];\n\n    const steps = [\n      { n: '1', t: 'お着替え', d: '動きやすい服装に。ウェア・シューズのレンタルもあり、手ぶらでOKです。' },\n      { n: '2', t: 'カウンセリング', d: 'なりたい姿やお悩みをお伺いします。無理な勧誘はしません。' },\n      { n: '3', t: '用紙記入', d: '体調や運動経験を確認。無理のない内容を一緒に決めます。' },\n      { n: '4', t: '体験トレーニング', d: 'あなたに合わせたメニューを、マンツーマンで丁寧に。' },\n      { n: '5', t: 'ストレッチ', d: '最後はゆっくり整えて終了。所要 約60分です。' },\n    ];\n\n    const faqData = [\n      { q: '運動経験がなくても大丈夫ですか？', a: 'はい、大丈夫です。お客様のほとんどがパーソナル初めて・運動が苦手な方です。一人ひとりの体力に合わせて進めます。' },\n      { q: 'どんな服装で行けばいいですか？', a: '動きやすい服装ならOK。ウェア・シューズ・タオルのレンタルもあるので、お仕事帰りに手ぶらでも通えます。' },\n      { q: '勧誘はしつこくないですか？', a: '無理な勧誘はいたしません。明朗会計で、料金はサイト掲載どおり。ご納得いただいてからのスタートです。' },\n      { q: '女性ひとりでも通いやすいですか？', a: 'マンツーマン専用で、自分のペースで取り組めます。女性のお客様も多く、安心して通っていただけます。' },\n      { q: 'シャワーや駐車場はありますか？', a: '駐車場はございません。京成船橋駅 徒歩3分・JR船橋駅 徒歩5分と駅近ですので、公共交通機関でお越しください。' },\n    ];\n    const faqs = faqData.map((f, i) => ({\n      ...f,\n      open: this.state.openIndex === i,\n      rot: this.state.openIndex === i ? 'rotate(180deg)' : 'rotate(0deg)',\n      onToggle: () => this.setState(s => ({ openIndex: s.openIndex === i ? -1 : i })),\n    }));\n\n    return {\n      showA: fv === 'a',\n      showB: fv === 'b',\n      setA: () => this.setState({ fv: 'a' }),\n      setB: () => this.setState({ fv: 'b' }),\n      problems, reasons, assurances, trainers, reviews, plans, steps, faqs,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
